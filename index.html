<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقات مصروفات البنزين</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
        }
        .modal-close {
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #ef4444;
        }
        .pin-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s;
        }
        .pin-dot.filled {
            background: #4f46e5;
            transform: scale(1.1);
        }
        .pin-input {
            letter-spacing: 8px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-buttons .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <nav class="bg-gradient-to-r from-indigo-700 to-violet-800 text-white shadow-lg sticky top-0 z-50 mb-8">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 space-x-reverse">
                <i class="fa-solid fa-id-card text-2xl text-amber-400"></i>
                <h1 class="text-xl font-black">بطاقات مصروفات البنزين</h1>
            </div>
            <span class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/10 backdrop-blur-md font-medium">تحديث فوري ⚡</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-12 space-y-6">

        <!-- Search and Action Buttons -->
        <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-200/60">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-filter absolute right-3 top-3.5 text-slate-400"></i>
                    <input type="text" id="searchBox" oninput="renderCards()" placeholder="ابحث عن شخص محدد..." 
                        class="w-full pl-3 pr-9 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="action-buttons">
                    <button onclick="openRequestModal()" class="btn btn-primary">
                        <i class="fa-solid fa-user-plus"></i> طلب إضافة اسم جديد
                    </button>
                    <a href="https://alnoaif2026.github.io/tsjil" target="_blank" class="btn btn-success">
                        <i class="fa-solid fa-gas-pump"></i> تسجيل تعبئة جديدة
                    </a>
                </div>
            </div>
        </div>

        <!-- Cards Grid -->
        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-slate-400 font-medium">
                <i class="fa-solid fa-circle-notch animate-spin text-indigo-600 text-2xl mb-3 block"></i>
                جاري تجميع البيانات وتجهيز البطاقات الخاصة...
            </div>
        </div>

    </main>

    <!-- Modal: طلب إضافة اسم جديد -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="text-xl font-bold text-slate-800">
                    <i class="fa-solid fa-user-plus text-indigo-500"></i> طلب إضافة اسم جديد
                </h2>
                <button class="modal-close" onclick="closeRequestModal()">&times;</button>
            </div>

            <form id="requestForm" class="space-y-4">
                <!-- الاسم الكامل -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        <i class="fa-regular fa-user text-indigo-500"></i> الاسم الكامل
                    </label>
                    <input type="text" id="reqFullName" required 
                        class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="أدخل الاسم الكامل">
                </div>

                <!-- نوع السيارة -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        <i class="fa-solid fa-car text-indigo-500"></i> نوع السيارة
                    </label>
                    <input type="text" id="reqCarType" required 
                        class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="مثال: هيونداي إلنترا">
                </div>

                <!-- موديل السيارة -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        <i class="fa-regular fa-calendar text-indigo-500"></i> موديل السيارة
                    </label>
                    <input type="number" id="reqCarModel" required 
                        class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="مثال: 2020" min="1900" max="2026">
                </div>

                <!-- نوع الوقود -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        <i class="fa-solid fa-gas-pump text-indigo-500"></i> نوع الوقود المفضل
                    </label>
                    <select id="reqFuelType" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white">
                        <option value="95">أحمر (95) - 2.33 ريال/لتر</option>
                        <option value="91" selected>أخضر (91) - 2.18 ريال/لتر</option>
                        <option value="98">أزرق (98) - 4.51 ريال/لتر</option>
                    </select>
                </div>

                <!-- الرقم السري -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">
                        <i class="fa-solid fa-lock text-indigo-500"></i> الرقم السري
                        <span class="text-xs font-normal text-slate-400">(4-8 أرقام فقط)</span>
                    </label>
                    <div class="pin-dots" id="reqPinDots">
                        <span class="pin-dot" data-index="0"></span>
                        <span class="pin-dot" data-index="1"></span>
                        <span class="pin-dot" data-index="2"></span>
                        <span class="pin-dot" data-index="3"></span>
                        <span class="pin-dot hidden" data-index="4"></span>
                        <span class="pin-dot hidden" data-index="5"></span>
                        <span class="pin-dot hidden" data-index="6"></span>
                        <span class="pin-dot hidden" data-index="7"></span>
                    </div>
                    <input type="password" id="reqPin" maxlength="8" required
                        class="pin-input w-full px-4 py-3 border-2 border-indigo-300 rounded-xl focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white"
                        placeholder="••••">
                    <div id="reqPinError" class="text-xs text-red-500 mt-1 hidden">
                        <i class="fa-solid fa-exclamation-circle"></i>
                        <span>الرقم السري يجب أن يكون 4-8 أرقام فقط</span>
                    </div>
                </div>

                <!-- أزرار التحكم -->
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="submitRequest()" 
                        class="flex-1 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200">
                        <i class="fa-solid fa-paper-plane ml-2"></i> إرسال الطلب
                    </button>
                    <button type="button" onclick="closeRequestModal()" 
                        class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-6 rounded-xl transition-all duration-200">
                        <i class="fa-solid fa-times ml-2"></i> إلغاء
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://hsabat-a4353-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const bnzimRef = database.ref('bnzim');
        const tlbatRef = database.ref('tlbat'); // مسار الطلبات

        let structuredData = {};

        // الاستماع الفوري لقاعدة البيانات
        bnzimRef.on('value', (snapshot) => {
            structuredData = {};

            if (!snapshot.exists()) {
                document.getElementById('cardsGrid').innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-slate-200 text-slate-400">
                        <i class="fa-solid fa-folder-open text-3xl mb-2 block text-slate-300"></i> لا توجد بيانات مسجلة حالياً في النظام.
                    </div>`;
                return;
            }

            snapshot.forEach((userSnapshot) => {
                const userName = userSnapshot.key;
                let car = "غير محدد";
                let model = "غير محدد";
                const records = [];

                userSnapshot.forEach((expenseSnapshot) => {
                    const data = expenseSnapshot.val();
                    if (data.car) car = data.car;
                    if (data.model) model = data.model;

                    records.push({
                        amount: parseFloat(data.amount) || 0,
                        liters: parseFloat(data.liters) || 0,
                        odometer: data.odometer || "غير محدد",
                        date: data.timestamp || "",
                        fuelName: data.fuelName || "غير محدد"
                    });
                });

                records.sort((a, b) => new Date(b.date) - new Date(a.date));

                structuredData[userName] = {
                    car: car,
                    model: model,
                    records: records
                };
            });

            renderCards();
        });

        function renderCards() {
            const cardsGrid = document.getElementById('cardsGrid');
            const searchQuery = document.getElementById('searchBox').value.trim().toLowerCase();
            cardsGrid.innerHTML = "";

            let hasData = false;

            for (const userName in structuredData) {
                if (searchQuery && !userName.toLowerCase().includes(searchQuery)) {
                    continue;
                }

                hasData = true;
                const userData = structuredData[userName];
                const records = userData.records;
                
                const totalAmount = records.reduce((sum, item) => sum + item.amount, 0);
                const totalLiters = records.reduce((sum, item) => sum + item.liters, 0);

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow duration-200";

                let cardHtml = `
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 text-white">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-indigo-300 text-sm">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <span class="font-bold tracking-wide text-base">${userName}</span>
                                </div>
                                <div class="flex items-center gap-3 text-xs text-slate-300 mt-1">
                                    <span><i class="fa-solid fa-car"></i> ${userData.car}</span>
                                    <span><i class="fa-solid fa-tag"></i> ${userData.model}</span>
                                </div>
                            </div>
                            <div class="text-left">
                                <div class="text-xs text-slate-400 font-medium">إجمالي المصروف</div>
                                <span class="text-xl font-black text-emerald-400">${totalAmount.toFixed(2)} <span class="text-xs">ريال</span></span>
                            </div>
                        </div>
                        <div class="flex gap-6 mt-3 pt-3 border-t border-white/10">
                            <div>
                                <span class="text-xs text-slate-400 block">اللترات</span>
                                <span class="text-lg font-bold text-cyan-300">${totalLiters.toFixed(2)}</span>
                            </div>
                            <div>
                                <span class="text-xs text-slate-400 block">عدد التعبئات</span>
                                <span class="text-lg font-bold text-white">${records.length}</span>
                            </div>
                            <div>
                                <span class="text-xs text-slate-400 block">متوسط اللتر/تعبئة</span>
                                <span class="text-lg font-bold text-amber-300">${records.length ? (totalLiters / records.length).toFixed(2) : '0'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 flex-1 overflow-y-auto max-h-[300px] space-y-3 bg-slate-50/50">
                        <p class="text-xxs font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-history"></i> سجلات التعبئة (${records.length}):</p>
                `;

                records.forEach(rec => {
                    const cleanDate = rec.date ? rec.date.replace('T', ' ') : 'غير محدد';
                    cardHtml += `
                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xxs flex justify-between items-center hover:border-slate-200 transition-colors">
                            <div class="space-y-1">
                                <div class="text-xs text-slate-400 font-semibold flex items-center gap-1">
                                    <i class="fa-regular fa-calendar text-slate-400"></i> ${cleanDate}
                                </div>
                                <div class="text-xs text-slate-500 font-medium flex items-center gap-2">
                                    ${rec.fuelName !== "غير محدد" ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">${rec.fuelName}</span>` : ''}
                                    ${rec.odometer !== "غير محدد" ? `<span><i class="fa-solid fa-gauge-high text-slate-300"></i> ${rec.odometer} كم</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-bold text-slate-700 text-sm">${rec.amount.toFixed(2)}</span> <span class="text-xxs font-bold text-slate-400">ريال</span>
                                <div class="text-xs text-slate-400">${rec.liters.toFixed(2)} لتر</div>
                            </div>
                        </div>
                    `;
                });

                cardHtml += `</div>`;
                card.innerHTML = cardHtml;
                cardsGrid.appendChild(card);
            }

            if (!hasData) {
                cardsGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass text-2xl mb-2 block text-slate-300"></i> لا يوجد شخص بهذا الاسم في السجلات.
                    </div>`;
            }
        }

        // ========== وظائف الطلب (tlbat) ==========
        
        function openRequestModal() {
            document.getElementById('requestModal').classList.add('active');
            document.getElementById('reqFullName').focus();
            // إعادة تعيين الحقول
            document.getElementById('reqFullName').value = '';
            document.getElementById('reqCarType').value = '';
            document.getElementById('reqCarModel').value = '';
            document.getElementById('reqFuelType').value = '91';
            document.getElementById('reqPin').value = '';
            document.getElementById('reqPinError').classList.add('hidden');
            updateRequestPinDots('');
        }

        function closeRequestModal() {
            document.getElementById('requestModal').classList.remove('active');
        }

        // إغلاق المودال عند النقر خارج المحتوى
        document.getElementById('requestModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRequestModal();
            }
        });

        // تحديث نقاط الرقم السري في الطلب
        function updateRequestPinDots(pin) {
            const dots = document.querySelectorAll('#reqPinDots .pin-dot');
            const length = pin.length;
            
            dots.forEach((dot, index) => {
                if (index < length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        // التحقق من الرقم السري أثناء الكتابة
        document.getElementById('reqPin').addEventListener('input', function() {
            const pin = this.value;
            // منع غير الأرقام
            this.value = pin.replace(/\D/g, '');
            updateRequestPinDots(this.value);
            
            const errorEl = document.getElementById('reqPinError');
            if (this.value.length > 0 && (this.value.length < 4 || this.value.length > 8)) {
                errorEl.classList.remove('hidden');
            } else {
                errorEl.classList.add('hidden');
            }
        });

        // منع اللصق في حقل الرقم السري
        document.getElementById('reqPin').addEventListener('paste', function(e) {
            e.preventDefault();
        });

        // إرسال الطلب
        function submitRequest() {
            const fullName = document.getElementById('reqFullName').value.trim();
            const carType = document.getElementById('reqCarType').value.trim();
            const carModel = document.getElementById('reqCarModel').value.trim();
            const fuelType = document.getElementById('reqFuelType').value;
            const pin = document.getElementById('reqPin').value.trim();

            // التحقق من الحقول
            if (!fullName) {
                alert('الرجاء إدخال الاسم الكامل');
                document.getElementById('reqFullName').focus();
                return;
            }
            if (!carType) {
                alert('الرجاء إدخال نوع السيارة');
                document.getElementById('reqCarType').focus();
                return;
            }
            if (!carModel) {
                alert('الرجاء إدخال موديل السيارة');
                document.getElementById('reqCarModel').focus();
                return;
            }
            if (!pin) {
                alert('الرجاء إدخال الرقم السري');
                document.getElementById('reqPin').focus();
                return;
            }

            // التحقق من صحة الرقم السري
            if (!/^\d{4,8}$/.test(pin)) {
                document.getElementById('reqPinError').classList.remove('hidden');
                document.getElementById('reqPin').focus();
                return;
            }

            // التحقق من صحة الموديل
            const modelNum = parseInt(carModel);
            if (isNaN(modelNum) || modelNum < 1900 || modelNum > 2026) {
                alert('الرجاء إدخال موديل صحيح (من 1900 إلى 2026)');
                document.getElementById('reqCarModel').focus();
                return;
            }

            // التحقق من عدم وجود الاسم مسبقاً
            bnzimRef.child(fullName).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert(`⚠️ الشخص "${fullName}" مسجل مسبقاً في النظام.`);
                    return;
                }

                // إنشاء طلب جديد في مسار tlbat
                const requestRef = tlbatRef.push();
                requestRef.set({
                    fullName: fullName,
                    carType: carType,
                    carModel: carModel,
                    fuelType: fuelType,
                    pin: pin,
                    status: 'pending', // pending, approved, rejected
                    requestDate: firebase.database.ServerValue.TIMESTAMP,
                    requestedBy: 'user'
                }).then(() => {
                    alert('✅ تم إرسال طلبك بنجاح! سيتم مراجعته من قبل المشرف.');
                    closeRequestModal();
                    
                    // إعادة تعيين الحقول
                    document.getElementById('reqFullName').value = '';
                    document.getElementById('reqCarType').value = '';
                    document.getElementById('reqCarModel').value = '';
                    document.getElementById('reqFuelType').value = '91';
                    document.getElementById('reqPin').value = '';
                    updateRequestPinDots('');
                    document.getElementById('reqPinError').classList.add('hidden');
                }).catch((error) => {
                    console.error('خطأ في إرسال الطلب:', error);
                    alert('حدث خطأ أثناء إرسال الطلب: ' + error.message);
                });
            }).catch((error) => {
                console.error('خطأ في التحقق:', error);
                alert('حدث خطأ في التحقق من البيانات: ' + error.message);
            });
        }

        // إغلاق المودال بالضغط على ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRequestModal();
            }
        });

        // تحميل البيانات عند بدء الصفحة
        console.log('✅ نظام بطاقات المصروفات جاهز');
    </script>
</body>
</html>
